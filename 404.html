<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | EvansMathibe Agency</title>
    <style>
        :root {
            --primary: #333333;
            --accent: #E87A7A;
            --text: #f5f5f5;
            --text-muted: #b0b0b0;
            --gradient: linear-gradient(135deg, #333333 0%, #2a2a2a 50%, #1f1f1f 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 600px; }
        h1 { font-size: 8rem; color: var(--accent); margin-bottom: 1rem; }
        h2 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }
        a {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s, background 0.3s;
        }
        a:hover { transform: translateY(-2px); background: #f0a5a5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="https://evansxm.github.io/evansmathibe-agency/">← Back to Home</a>
    </div>
</body>
</html>
